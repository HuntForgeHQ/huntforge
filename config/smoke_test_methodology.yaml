# =============================================================================
# HuntForge - Smoke Test Methodology
# Quick 3-phase scan for validation (5-15 minutes)
# =============================================================================

meta:
  version: "1.0"
  name: "Smoke Test"
  description: "Quick recon to validate installation - runs phases 1-3 only"
  author: "HuntForge"
  iterative: false
  ai_guided: false

global_defaults:
  timeout: 300
  retries: 1
  rate_limit: null
  output_format: "txt"
  enabled: true

phases:

  phase_1_quick_recon:
    label: "Quick Recon"
    description: "Fast subdomain discovery"
    parallel: true
    weight: light
    depends_on: []

    output_files:
      subdomains_merged: "processed/all_subdomains.txt"

    tags_emitted:
      subdomain_list: "subdomains discovered"

    tools:
      dnsx:
        enabled: true
        binary: "dnsx"
        weight: light
        timeout: 60
        output_file: "raw/dnsx.txt"
        default_flags: "-d {domain} -o {output_file} -silent -a"
        config:
          threads: 10

  phase_2_live_discovery:
    label: "Live Discovery"
    description: "Find live hosts with httpx"
    parallel: false
    weight: light
    depends_on:
      - phase_1_quick_recon

    input_files:
      subdomains: "processed/all_subdomains.txt"

    output_files:
      live_hosts: "processed/live_hosts.json"

    tags_emitted:
      live_hosts_found: "Live hosts discovered"

    tools:
      httpx:
        enabled: true
        binary: "httpx"
        weight: medium
        timeout: 120
        output_file: "raw/httpx.json"
        default_flags: "-l {input_file} -o {output_file} -json -silent -title -status-code -tech-detect"
        config:
          threads: 25
          tech_detect: true

  phase_3_quick_vuln:
    label: "Quick Vuln Scan"
    description: "Light vulnerability scanning with nuclei"
    parallel: false
    weight: light
    depends_on:
      - phase_2_live_discovery

    input_files:
      live_hosts: "processed/live_hosts.json"

    output_files:
      vulnerabilities: "processed/vulnerabilities.json"
      nuclei_results: "raw/nuclei.json"

    tags_emitted:
      critical_found: "Critical vulnerability found"
      high_found: "High severity vulnerability found"

    tools:
      nuclei:
        always: true
        binary: "nuclei"
        weight: medium
        timeout: 600
        output_file: "raw/nuclei.json"
        default_flags: "-l {all_urls_file} -o {output_file} -json -silent"
        config:
          templates: "cves,misconfigurations,exposures"
          severity: "critical,high,medium"
          rate_limit: 100
          concurrency: 25

      nikto:
        always: false
        if_tag: "live_hosts_found"
        binary: "nikto"
        weight: medium
        timeout: 300
        output_file: "raw/nikto.xml"
        default_flags: "-h https://{domain} -o {output_file} -Format xml -maxtime 10m -nointeractive"
        config:
          tuning: "x6"

wordlists:
  base_dir: "~/.huntforge/wordlists"

scope:
  strict_mode: true
  allow_wildcards: true
  out_of_scope_action: "skip"

budget:
  enabled: true
  max_requests_total: 10000
  warn_at_percent: 80
  action_on_exceeded: "warn"

resource_monitor:
  enabled: false  # Disable for smoke test

logging:
  level: "INFO"
  show_tool_output: true
  show_skipped_tools: true
