# Resource Profile: Lite (3-4 GB RAM)
# Equalized: All tools installed, but only optimized "best of breed" run by default.
# Full capability available via manual methodology edits or profile overrides.

resource_limits:
  max_concurrent_tools: 2
  max_ram_gb: 3.0
  max_cpu_percent: 80
  safety_margin_percent: 25

tool_selection:
  # Phase 1 - Passive Recon: Fast, lightweight sources only
  phase_1_passive_recon:
    enabled_tools: ['subfinder', 'crtsh', 'assetfinder']
    # Skipped: amass (slow), theharvester (slow), findomain (duplicate), chaos (API needed), waybackurls (optional)

  # Phase 2 - Secrets & OSINT: Lightweight scanners only
  phase_2_secrets_osint:
    enabled_tools: ['gitleaks', 'jsluice']
    # Skipped: trufflehog (slow), github_dorking (optional), secretfinder (slow), linkfinder (slow)

  # Phase 3 - Live Discovery: Minimal probing
  phase_3_asset_discovery:
    enabled_tools: ['httpx', 'dnsx']
    # Skipped: naabu (aggressive), puredns (duplicate), gowitness (screenshots heavy), asnmap (optional)

  # Phase 4 - Surface Intel: Single lightweight tool
  phase_4_surface_intelligence:
    enabled_tools: ['whatweb']
    # Skipped: wappalyzer_cli (duplicate), nmap_service (slow), shodan_cli (API), censys_cli (API)

  # Phase 5 - Enumeration: Focused crawlers
  phase_5_enumeration:
    enabled_tools: ['katana', 'gau']
    # Skipped: gospider (slow), paramspider (duplicate), gf_extract (runs on output), graphql_voyager (conditional), arjun (conditional)

  # Phase 6 - Content Discovery: Single fast tool
  phase_6_content_discovery:
    enabled_tools: ['ffuf']
    # Skipped: dirsearch (duplicate), feroxbuster (duplicate), wpscan (conditional), s3scanner (conditional), cloud_enum (conditional)

  # Phase 7 - Vuln Scan: Lightweight, low-noise scanners
  phase_7_vuln_scan:
    enabled_tools: ['nuclei', 'subjack']
    # Skipped: nikto (noisy), dalfox (requires params), sqlmap (very slow), nuclei_cms (conditional), nuclei_auth (conditional), wpscan_vuln (conditional), cors_scanner (conditional), ssrf_check (conditional)

tool_overrides:
  # Override methodology defaults to ensure full-depth scans even on lite
  katana:
    depth: 5              # Full depth (methodology uses 3)
    concurrency: 5        # Reduced concurrency for RAM
    js_crawl: true
  gau:
    threads: 3            # Conservative

  # Phase 7 tuning
  nuclei:
    concurrency: 20       # Reduced from 25
    bulk_size: 50
    templates: "cves,misconfigurations,exposures,takeovers"

  # Phase 3
  httpx:
    threads: 15
    rate_limit: 50
  dnsx:
    threads: 20

  # Phase 1
  subfinder:
    threads: 10
    rate_limit: 50

scheduler:
  light_phase_concurrency: 5   # Max 5 tools in light phases (1,2,5)
  heavy_phase_concurrency: 1   # Sequential in heavy phases (6,7)
  enable_throttling: true
  respect_user_activity: true
