version: '3.8'

services:
  kali:
    build:
      context: .
      dockerfile: Dockerfile.kali
    container_name: huntforge-kali
    volumes:
      - ./:/huntforge
      - ~/.huntforge:/root/.huntforge
    working_dir: /huntforge
    command: tail -f /dev/null
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 128M
    networks:
      - huntforge



networks:
  huntforge:
    driver: bridge
