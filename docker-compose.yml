version: '3.8'

services:
  huntforge:
    build:
      context: .
      dockerfile: Dockerfile.kali
    container_name: huntforge
    network_mode: "host"
    volumes:
      - ./output:/home/huntforge/output
      - ./config:/home/huntforge/config:ro
      - ./data:/home/huntforge/data:ro
      - ./logs:/home/huntforge/logs
      - ~/.huntforge:/home/huntforge/.huntforge:rw
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}
      - CENSYS_API_ID=${CENSYS_API_ID:-}
      - CENSYS_API_SECRET=${CENSYS_API_SECRET:-}
      - WPSCAN_API_TOKEN=${WPSCAN_API_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - CHAOS_API_KEY=${CHAOS_API_KEY:-}
    working_dir: /home/huntforge
    stdin_open: true
    tty: true
    restart: unless-stopped
    # Simple health check
    healthcheck:
      test: ["CMD", "python3", "-c", "from core.orchestrator import Orchestrator; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: huntforge-dashboard
    ports:
      - "5000:5000"
    volumes:
      - ./output:/home/huntforge/output:ro
      - ./logs:/home/huntforge/logs:ro
    environment:
      - HUNTFORGE_OUTPUT_DIR=/home/huntforge/output
    depends_on:
      - huntforge
    restart: unless-stopped
