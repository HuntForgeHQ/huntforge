<!DOCTYPE html>
<html>
<head>
    <title>HuntForge Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>HuntForge Dashboard</h1>
        <div class="card">
            <h2>Recent Scans</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Domain</th>
                        <th>Status</th>
                        <th>Tags Discovered</th>
                        <th>Start Time</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                {% for scan in scans %}
                    <tr>
                        <td>{{ scan.id }}</td>
                        <td><strong>{{ scan.domain }}</strong></td>
                        <td>
                            <span class="status {% if scan.status == 'RUNNING' %}status-running{% elif scan.status == 'COMPLETED' or scan.status == 'DONE' %}status-done{% elif scan.status == 'FAILED' or scan.status == 'ERROR' %}status-failed{% else %}status-running{% endif %}">
                                {{ scan.status }}
                            </span>
                        </td>
                        <td>{{ scan.tag_count or '?' }}</td>
                        <td>{{ scan.start_time }}</td>
                        <td><a href="/scan/{{ scan.id }}">View Details</a></td>
                    </tr>
                {% else %}
                    <tr><td colspan="6" class="empty-state"><p>No scans recorded yet.</p></td></tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
